<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Save the Date - Charlotte & Theodore</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@300;400;600&family=Tenor+Sans&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="invitation_styles.css">
</head>
<body class="save-the-date">
    <div class="invitation-container">
        <div class="envelope" id="envelope">
            <div class="envelope-flap" id="envelopeFlap">
                <div class="seal">
                    <div class="seal-content">
                        <span class="seal-text">LIFT THE SEAL TO BEGIN</span>
                        <div class="wax-seal">
                            <div class="seal-ribbon">
                                <span class="ribbon-letter">T</span>
                                <span class="ribbon-letter">C</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="envelope-body">
                <div class="card-content" id="cardContent">
                    <div class="header-text">
                        <p class="together-with">together with their families</p>
                    </div>
                    
                    <div class="names-section">
                        <h1 class="bride-name">Charlotte</h1>
                        <div class="ampersand">&</div>
                        <h1 class="groom-name">Theodore</h1>
                    </div>
                    
                    <div class="save-the-date-text">
                        <h2 class="save-date">Save the Date</h2>
                        <div class="wedding-date">
                            <span class="date-number">07.11.2027</span>
                        </div>
                        <p class="wedding-tagline">We're tying the knot</p>
                    </div>
                    
                    <div class="formal-invitation">
                        <p>Formal invitation<br>to follow...</p>
                    </div>
                    
                    <div class="rsvp-button">
                        <a href="invitation.html" class="rsvp-link">
                            <span class="button-text">Kindly</span>
                            <span class="button-subtext">Share Your Address for Invites Here...</span>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="invitation_script.js"></script>
</body>
</html>
